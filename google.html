<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="google.css">
	<title>Document</title>
</head>
<body>
	<div class="google-countainer">
		<div class="google-calkulator">
			<a href="#">Добавить в Закладки</a>
			<a href="#">Calculator88.ru</a>
			<div class="google-input">
				<input type="text" name="" id="" value="0" class="input">
			</div>
			<button class="paragraf">Бугалтерский</button>
			<div class="block-1">
				<button class="btn-1">MC</button>
				<button class="btn-1">MR</button>
				<button class="btn-1">M-</button>
				<button class="btn-1">M+</button>
				<button class="btn-1">&#8730</button>
				<button class="btn-1">MU</button>
			</div>
			<div class="block-2">
				<button class="btn-2">&#177</button>
				<button class="btn-2">7</button>
				<button class="btn-2">8</button>
				<button class="btn-2">9</button>
				<button class="btn-2">&#247</button>
				<button class="btn-2">%</button>
			</div>
			<div class="block-3">
				<button class="btn-3">&#8594</button>
				<button class="btn-3">4</button>
				<button class="btn-3">5</button>
				<button class="btn-3">6</button>
				<button class="btn-3">&#215</button>
				<button class="btn-3">-</button>
			</div>
			<div class="block-4">
				<button class="btn-4">AC</button>
				<button class="btn-4">1</button>
				<button class="btn-4">2</button>
				<button class="btn-4">3</button>
				<button class="btn-plus">+</button>
				<button class="btn-result">=</button>
			</div>
			<div class="block-5">
				<button class="btn-5">C</button>
				<button class="btn-5">0</button>
				<button class="btn-5">00</button>
				<button class="btn-5">.</button>
			</div>
			<div class="text-content">
				<p>Знаков после запятой - F <button class="setting">(настр)</button></p>
				<p>PC/<button class="mobile-btn">Mobile</button></p>
			</div>
			
		</div>
	</div>
</body>
</html>
